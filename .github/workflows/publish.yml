name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Build, Publish, and Sync Website Releases
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    permissions:
      contents: write
      id-token: write
      actions: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: cli/package-lock.json

      - run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Validate release version
        working-directory: .
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');
          const version = process.env.GITHUB_REF_NAME.replace(/^v/, '');
          const packageJson = JSON.parse(fs.readFileSync(path.join('cli', 'package.json'), 'utf8'));
          const pluginJson = JSON.parse(fs.readFileSync(path.join('plugin', '.claude-plugin', 'plugin.json'), 'utf8'));
          const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
          const header = `## [${version}]`;
          if (packageJson.version !== version) {
            throw new Error(`cli/package.json 版本 ${packageJson.version} 与 tag ${version} 不一致`);
          }
          if (pluginJson.version !== version) {
            throw new Error(`plugin/.claude-plugin/plugin.json 版本 ${pluginJson.version} 与 tag ${version} 不一致`);
          }
          if (!changelog.includes(header)) {
            throw new Error(`找不到 ${version} 对应的 CHANGELOG 条目`);
          }
          NODE

      - name: Prepare release notes
        working-directory: .
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const version = process.env.GITHUB_REF_NAME.replace(/^v/, '');
          const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
          const header = `## [${version}]`;
          const start = changelog.indexOf(header);
          if (start === -1) {
            throw new Error(`找不到 ${version} 对应的 CHANGELOG 条目`);
          }
          const nextHeader = changelog.indexOf('\n## [', start + header.length);
          const body = (nextHeader === -1 ? changelog.slice(start) : changelog.slice(start, nextHeader)).trim() + '\n';
          fs.writeFileSync('release-notes.md', body);
          NODE

      - name: Pack CLI
        run: rm -f miniidealab-openlogos-*.tgz && npm pack

      - name: Publish
        run: npm publish miniidealab-openlogos-*.tgz --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        working-directory: .
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file release-notes.md \
            --latest \
            cli/miniidealab-openlogos-*.tgz

      - name: Prepare website environment
        working-directory: website
        run: npm ci

      - name: Setup Node.js for website build
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Generate release data (strict)
        working-directory: website
        run: npm run generate:releases -- --strict

      - name: Build website (strict release data)
        working-directory: website
        run: npm run build

      - name: Verify website latest version matches tag
        working-directory: .
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');

          const releaseVersion = (process.env.RELEASE_VERSION || '').replace(/^v/, '');
          if (!releaseVersion) {
            throw new Error('无法从 github.ref_name 解析 tag 版本');
          }
          const releaseDataPath = path.join('website', 'src', 'data', 'releases.json');
          if (!fs.existsSync(releaseDataPath)) {
            throw new Error(`缺少发布数据文件：${releaseDataPath}`);
          }
          const releaseData = JSON.parse(fs.readFileSync(releaseDataPath, 'utf8'));
          if (releaseData.latestVersion !== releaseVersion) {
            throw new Error(`官网发布数据 latestVersion=${releaseData.latestVersion} 与 tag=${releaseVersion} 不一致`);
          }
          console.log(`Website latestVersion matches tag: ${releaseVersion}`);
          NODE

      - name: Verify Cloudflare deploy secrets
        id: verify_cf_secrets
        working-directory: .
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN}" ] || [ -z "${CLOUDFLARE_ACCOUNT_ID}" ]; then
            echo "缺少 Cloudflare Pages 发布凭据（CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID）"
            echo "为满足 tag 发版后官网同步门禁，本次发布失败。"
            exit 1
          fi

      - name: Deploy website to Cloudflare Pages
        working-directory: website
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy dist --project-name openlogos

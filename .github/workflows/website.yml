name: Deploy Website

on:
  push:
    branches: [master]
    paths:
      - 'website/**'
  workflow_dispatch:

jobs:
  build:
    name: Build Website
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm
          cache-dependency-path: website/package-lock.json

      - run: npm ci

      # 字体子集化依赖：build 的 subset:fonts 步骤调用 Python fontTools 生成中文字体子集。
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install font subsetting deps
        run: python -m pip install fonttools brotli

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

project:
  name: "openlogos"
  description: ""
  methodology: "OpenLogos"

tech_stack:
  language: TypeScript
  runtime: Node.js >=18
  cli:
    package: "@miniidealab/openlogos"
    module_format: ESM
    testing: Vitest
    key_dependency: yaml ^2.8.3
  website:
    framework: Astro 6.x
    docs_theme: "@astrojs/starlight"
    hosting: Cloudflare Pages
    release_data_pipeline: "npm run generate:releases -> npm run build -> npm run deploy"
  plugin_templates:
    - claude-plugin-template
    - opencode-plugin-template
    - codex-plugin-template
  release_channels:
    package_registry: npm
    source_of_truth: GitHub tag + CHANGELOG.md
    release_archive: GitHub Releases

scenario_counter:
  next_id: 21

modules:
  - id: core
    name: 核心功能
    lifecycle: launched
    bootstrap: adopted
    skip_phases: [api, database, scenario]
    deployment_required: true

scenarios:
  - id: S01
    name: 初始化 OpenLogos 项目
    module: core
  - id: S05
    name: 查看下一步建议
    module: core
  - id: S08
    name: 同步 AI 工具资产与资源索引
    module: core
  - id: S09
    name: 创建、合并、归档变更提案
    module: core
  - id: S11
    name: 查看阶段进度与活跃变更
    module: core
  - id: S13
    name: 运行测试验收并生成报告
    module: core
  - id: S14
    name: 切换到 launched 生命周期
    module: core
  - id: S15
    name: 处理 SQL 注释规范
    module: core
  - id: S16
    name: 输出机器可读 JSON
    module: core
  - id: S17
    name: 管理模块注册表
    module: core
  - id: S18
    name: 同步 resource_index
    module: core
  - id: S19
    name: 执行部署后 smoke 门禁
    module: core
  - id: S20
    name: 已有项目接入 OpenLogos
    module: core

release_workflows:
  cli_tag_release:
    name: CLI tag 驱动标准发版（GitHub Workflow 唯一入口）
    status: standard
    trigger:
      - git push origin vX.Y.Z
    automation:
      workflow_file: .github/workflows/publish.yml
      workflow_name: "Publish to npm"
      trigger_event: push(tags: v*)
      publish_policy: 禁止本地手工 npm publish，统一由 GitHub Actions 使用 NPM_TOKEN 发布
    preconditions:
      - 工作区已提交待发布改动（避免脏工作区干扰版本核对）
      - cli/package.json、plugin/.claude-plugin/plugin.json、CHANGELOG.md 版本号与 tag 一致
      - cd cli && npm test 通过
      - cd cli && npm run build 通过
      - GitHub Secrets 已配置：NPM_TOKEN、CLOUDFLARE_API_TOKEN、CLOUDFLARE_ACCOUNT_ID
    commands:
      - git commit -m "chore(release): prepare vX.Y.Z"
      - git tag vX.Y.Z
      - git push origin master
      - git push origin vX.Y.Z
      - gh run list --workflow ".github/workflows/publish.yml" --limit 5
      - gh run watch <run-id>
      - npm view @miniidealab/openlogos version --json
      - gh release view vX.Y.Z
    outputs:
      - "npm: @miniidealab/openlogos"
      - GitHub Release: vX.Y.Z
      - 官网 /releases 与发布 tag 同步
    failure_diagnostics:
      - 若 Actions run 显示 workflow 名为 `.github/workflows/publish.yml` 且 jobs 为空：优先检查 workflow 语法/触发条件是否导致配置失效
      - 若 Publish 步骤失败：检查 NPM_TOKEN 权限、npm 包名权限与 provenance 设置
      - 若官网同步步骤失败：检查 Cloudflare secrets、website 构建日志与 releases 数据生成
      - 若 tag 已推送但发布失败：修复后使用新 patch 版本重新打 tag（禁止复用失败 tag）
    references:
      - logos/spec/release-process.md
      - logos/resources/prd/3-technical-plan/1-architecture/core-03-release-and-versioning.md
      - logos/resources/prd/3-technical-plan/3-deployment/core-01-deployment-plan.md

  website_release_sync:
    name: 官网发布动态与文档站发布
    status: standard
    trigger:
      - 由 cli_tag_release 的 publish workflow 在同一条流水线内执行
      - 仅作为 tag 发布链路的组成步骤，不接受手工跳过
    commands:
      - cd website && npm run generate:releases
      - cd website && npm run build
      - cd website && npm run deploy
    outputs:
      - website/dist
      - /releases 页面最新版本、发布时间与摘要
    references:
      - logos/resources/prd/3-technical-plan/3-deployment/core-01-deployment-plan.md
      - logos/resources/test/smoke/core-smoke-test-cases.md

deployment_gates:
  core:
    deployment_required: true
    smoke_required: true
    environments:
      - staging


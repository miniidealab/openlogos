# ⚠️ 重要：本 logos/ 目录是 OpenLogos 对【自身方法论的 dogfooding 产物】，不是生产代码。
# 生产代码 / 规格 / Skill 的唯一源头在仓库【根目录】（cli/、spec/、skills/）。
# 任何对规格或 Skill 的修改，必须先改根目录源码，再经 `openlogos sync` 同步到 logos/。
# 切勿把本目录下的文件当作产品实现来修改或交付。
project:
  name: "openlogos"
  description: ""
  methodology: "OpenLogos"

tech_stack:
  language: TypeScript
  runtime: Node.js >=18
  cli:
    package: "@miniidealab/openlogos"
    module_format: ESM
    testing: Vitest
    key_dependency: yaml ^2.8.3
  website:
    framework: Astro 6.x
    docs_theme: "@astrojs/starlight"
    hosting: Cloudflare Pages
    release_data_pipeline: "npm run generate:releases -> npm run build -> npm run deploy"
  plugin_templates:
    - claude-plugin-template
    - opencode-plugin-template
    - codex-plugin-template
  release_channels:
    package_registry: npm
    source_of_truth: GitHub tag + CHANGELOG.md
    release_archive: GitHub Releases

scenario_counter:
